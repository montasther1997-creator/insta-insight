name: insta_insight
description: محلل حسابات إنستغرام الذكي

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.3.0

  # Instagram OAuth
  flutter_web_auth_2: ^5.0.0
  url_launcher: ^6.2.0

  # Gemini AI
  google_generative_ai: ^0.4.0

  # HTTP
  dio: ^5.4.0
  http: ^1.2.0

  # Charts
  fl_chart: ^0.68.0

  # State Management
  flutter_riverpod: ^2.5.0

  # Caching
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.0

  # UI
  shimmer: ^3.0.0
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.0
  flutter_dotenv: ^5.1.0

  # Audio playback (trending track previews)
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - .env
