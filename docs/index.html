<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaInsight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #0A0A0F;
            color: #E0E0E0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { text-align: center; max-width: 500px; }
        h1 {
            background: linear-gradient(135deg, #C77DFF, #FF6B9D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle { color: #888; font-size: 1.2em; margin-bottom: 40px; }
        .links { display: flex; flex-direction: column; gap: 15px; }
        a {
            display: block;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #222;
            border-radius: 12px;
            color: #C77DFF;
            text-decoration: none;
            font-size: 1.1em;
            transition: all 0.3s;
        }
        a:hover {
            background: rgba(199, 125, 255, 0.1);
            border-color: #C77DFF;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>InstaInsight</h1>
        <p class="subtitle">محلل حسابات إنستغرام الذكي</p>
        <div class="links">
            <a href="privacy-policy.html">سياسة الخصوصية</a>
            <a href="data-deletion.html">طلب حذف البيانات</a>
        </div>
    </div>
</body>
</html>
